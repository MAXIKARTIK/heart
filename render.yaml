# Render Blueprint - FULL-FEATURED free deployment.
#
# One free Render web service runs everything: the React frontend (bundled by
# Dockerfile.web), the FastAPI API, AND a Celery worker (in-process, low-memory
# "solo" pool). Persistence and the async task queue use free managed services
# you provide as secrets: DATABASE_URL (e.g. Neon Postgres) and REDIS_URL
# (e.g. Upstash Redis). With both set, the online app has the SAME features as
# the local docker-compose stack: Postgres logging + Celery/Redis async batch.
#
# This file ONLY affects the online deployment. Local development
# (docker-compose.yml and the default Dockerfile.web command) is unchanged:
# without DATABASE_URL/REDIS_URL the app transparently falls back to SQLite +
# synchronous batch.
services:
  - type: web
    name: heart-disease-risk
    runtime: docker
    dockerfilePath: ./Dockerfile.web
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    autoDeploy: true
    # Runs migrations, an in-process Celery worker (if REDIS_URL is set), then
    # the API. Kept in a script file so Render's shell can't mangle operators.
    dockerCommand: sh /app/backend/start-render.sh
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
      # Public demo: no API key (a same-origin SPA can't keep one secret).
      - key: API_KEY
        value: ""
      # Set these two in the Render dashboard (Environment tab). Until they are
      # set the app runs on SQLite + synchronous batch.
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
