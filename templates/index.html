<!DOCTYPE html>
<html>
<head>
    <title>Heart Disease Prediction</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

<h1>Heart Disease Prediction</h1>

<form action="/predict" method="POST">

<input type="number" name="age" placeholder="Age" required>

<select name="sex">
    <option value="1">Male</option>
    <option value="0">Female</option>
</select>

<select name="cp">
    <option value="0">Typical Angina</option>
    <option value="1">Atypical Angina</option>
    <option value="2">Non-anginal Pain</option>
    <option value="3">Asymptomatic</option>
</select>

<input type="number" name="trestbps" placeholder="Resting BP" required>

<input type="number" name="chol" placeholder="Cholesterol" required>

<select name="fbs">
    <option value="0">FBS <= 120</option>
    <option value="1">FBS > 120</option>
</select>

<select name="restecg">
    <option value="0">Normal</option>
    <option value="1">ST-T Abnormality</option>
    <option value="2">LV Hypertrophy</option>
</select>

<input type="number" name="thalach" placeholder="Max Heart Rate" required>

<select name="exang">
    <option value="0">No Exercise Angina</option>
    <option value="1">Exercise Angina</option>
</select>

<input type="number" step="0.1" name="oldpeak" placeholder="Oldpeak" required>

<select name="slope">
    <option value="0">Upsloping</option>
    <option value="1">Flat</option>
    <option value="2">Downsloping</option>
</select>

<input type="number" name="ca" placeholder="Number of Vessels" required>

<select name="thal">
    <option value="0">Normal</option>
    <option value="1">Fixed Defect</option>
    <option value="2">Reversible Defect</option>
   
</select>

<button type="submit">Predict</button>

</form>

{% if prediction %}
<div class="result">
    <h2>{{ prediction }}</h2>
    <h3>Probability: {{ probability }}%</h3>
</div>
{% endif %}

</div>

</body>
</html>
